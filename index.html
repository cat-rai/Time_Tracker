<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Time Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Time Tracker</h1>
      <div class="date" id="today-date"></div>
    </header>

    <main class="tracker">
      <div class="timer-display">
        <div id="current-category" class="current-category">—</div>
        <div id="live-timer" class="live-timer">00:00:00</div>
      </div>

      <div class="categories-section">
        <div class="category-buttons" id="category-buttons"></div>
        <button id="toggle-more-categories" class="toggle-more-btn">More</button>

        <div id="more-categories-section" class="more-categories-section hidden">
          <div class="category-buttons" id="more-category-buttons"></div>
          <form id="add-category-form" class="add-category-form">
            <input
              id="new-category-input"
              type="text"
              placeholder="Add category..."
              autocomplete="off"
              maxlength="30"
            />
            <button type="submit" class="add-btn">+</button>
          </form>
        </div>
      </div>
    </main>

    <section class="chart-section">
      <div class="chart-header">
        <h2>Today</h2>
        <div style="display: flex; gap: 8px;">
          <div class="chart-toggle">
            <button id="toggle-pie-chart" class="toggle-btn active">Pie</button>
            <button id="toggle-bar-chart" class="toggle-btn">Bar</button>
          </div>
          <div class="chart-toggle">
            <button id="toggle-by-category" class="toggle-btn active">By Category</button>
            <button id="toggle-by-subcategory" class="toggle-btn">By Subcategory</button>
          </div>
        </div>
      </div>
      <div id="chart-container" class="chart-container">
        <svg id="pie-chart" viewBox="0 0 400 400"></svg>
        <div id="chart-legend" class="chart-legend"></div>
      </div>
    </section>

    <section class="log">
      <div class="log-header">
        <h2>Sessions</h2>
        <div class="log-total" id="today-total">0h 0m</div>
      </div>
      <ul id="session-list" class="session-list"></ul>
      <p id="empty-state" class="empty-state">No sessions yet. Hit Start.</p>
    </section>
  </div>

  <!-- Edit category modal -->
  <div id="edit-category-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Category</h2>
        <button class="modal-close" id="edit-modal-close-btn">×</button>
      </div>
      <div class="modal-body">
        <label for="edit-category-input" style="display: block; margin-bottom: 12px; font-weight: 600;">Category name:</label>
        <input
          id="edit-category-input"
          type="text"
          placeholder="Enter category name"
          autocomplete="off"
          maxlength="30"
          style="width: 100%; padding: 10px 12px; border: 1px solid var(--surface-2); border-radius: 8px; background: var(--surface-2); color: var(--text); font-size: 14px; font-family: inherit; margin-bottom: 16px;"
        />
        <div style="display: flex; gap: 8px;">
          <button id="edit-category-save" class="start-session-btn" style="flex: 1;">Save</button>
          <button id="edit-category-cancel" class="modal-close" style="flex: 1; background: var(--surface-2); color: var(--text);">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Subcategory selection modal -->
  <div id="subcategory-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-category-title">Category</h2>
        <button class="modal-close" id="modal-close-btn">×</button>
      </div>

      <div class="modal-body">
        <!-- Common subcategories -->
        <div class="common-subcategories">
          <div class="section-label">Recently used</div>
          <div id="common-subcategories-list" class="subcategory-buttons"></div>
        </div>

        <!-- New subcategory input -->
        <form id="new-subcategory-form" class="new-subcategory-form">
          <input
            id="new-subcategory-input"
            type="text"
            placeholder="New subcategory..."
            autocomplete="off"
            maxlength="30"
          />
          <button type="submit" class="submit-btn">Create</button>
        </form>

        <!-- Detail/note field -->
        <div class="detail-section">
          <label for="detail-input">Details (optional)</label>
          <input
            id="detail-input"
            type="text"
            placeholder="What are you working on?"
            maxlength="100"
          />
        </div>

        <!-- Start button -->
        <button id="start-session-btn" class="start-session-btn">Start</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
